name: Sync Release from zagent

on:
  repository_dispatch:
    types: [sync_release]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name to sync (e.g. v0.8.0)'
        required: true
        type: string
      source_repo:
        description: 'Source repository (default: ctz168/zagent)'
        required: false
        type: string
        default: 'ctz168/zagent'

permissions:
  contents: write

jobs:
  sync-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout zagent_r
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine source info
        id: source
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "tag_name=${{ github.event.client_payload.tag_name }}" >> $GITHUB_OUTPUT
            echo "source_repo=${{ github.event.client_payload.source_repo }}" >> $GITHUB_OUTPUT
          else
            echo "tag_name=${{ inputs.tag_name }}" >> $GITHUB_OUTPUT
            echo "source_repo=${{ inputs.source_repo }}" >> $GITHUB_OUTPUT
          fi

      - name: Wait for all assets to be available
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          TAG="${{ steps.source.outputs.tag_name }}"
          REPO="${{ steps.source.outputs.source_repo }}"
          
          echo "Waiting for all assets to be uploaded to ${REPO} release ${TAG}..."
          
          # Wait up to 15 minutes for all assets (including APK from android job)
          MAX_WAIT=15
          WAITED=0
          EXPECTED_MIN_ASSETS=7  # At minimum: 6 platform archives + checksums
          
          while [ $WAITED -lt $MAX_WAIT ]; do
            ASSET_COUNT=$(gh api "repos/${REPO}/releases/tags/${TAG}" --jq '.assets | length' 2>/dev/null || echo "0")
            echo "  Current assets: ${ASSET_COUNT} (waited ${WAITED} min)"
            
            if [ "$ASSET_COUNT" -ge "$EXPECTED_MIN_ASSETS" ]; then
              # Check if APK is present (android job may still be running)
              HAS_APK=$(gh api "repos/${REPO}/releases/tags/${TAG}" --jq '.assets[].name' 2>/dev/null | grep -c "android\|apk" || echo "0")
              if [ "$HAS_APK" -ge 1 ]; then
                echo "All assets including APK are available!"
                break
              fi
              # If no APK after 5 minutes, proceed anyway (desktop-only release)
              if [ $WAITED -ge 5 ]; then
                echo "No APK found after 5 minutes, proceeding with desktop assets only."
                break
              fi
            fi
            
            sleep 60
            WAITED=$((WAITED + 1))
          done
          
          if [ $WAITED -ge $MAX_WAIT ]; then
            echo "::warning::Timed out waiting for assets. Proceeding with whatever is available."
          fi

      - name: Fetch source release info
        id: release
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          TAG="${{ steps.source.outputs.tag_name }}"
          REPO="${{ steps.source.outputs.source_repo }}"
          
          echo "Syncing release ${TAG} from ${REPO}..."
          
          # Get release info
          RELEASE_JSON=$(gh api "repos/${REPO}/releases/tags/${TAG}")
          if [ $? -ne 0 ]; then
            echo "::error::Release ${TAG} not found in ${REPO}"
            exit 1
          fi
          
          # Extract release details
          RELEASE_ID=$(echo "$RELEASE_JSON" | jq -r '.id')
          RELEASE_BODY=$(echo "$RELEASE_JSON" | jq -r '.body // empty')
          RELEASE_NAME=$(echo "$RELEASE_JSON" | jq -r '.name // "${TAG}"')
          PRERELEASE=$(echo "$RELEASE_JSON" | jq -r '.prerelease')
          DRAFT=$(echo "$RELEASE_JSON" | jq -r '.draft')
          
          echo "release_id=${RELEASE_ID}" >> $GITHUB_OUTPUT
          echo "release_name=${RELEASE_NAME}" >> $GITHUB_OUTPUT
          echo "prerelease=${PRERELEASE}" >> $GITHUB_OUTPUT
          echo "draft=${DRAFT}" >> $GITHUB_OUTPUT
          
          # Save body to file for multiline handling
          echo "$RELEASE_BODY" > /tmp/release_body.txt
          
          # List and download assets
          mkdir -p /tmp/assets
          cd /tmp/assets
          echo "$RELEASE_JSON" | jq -r '.assets[] | "\(.id) \(.name)"' | while read -r ASSET_ID ASSET_NAME; do
            echo "Downloading ${ASSET_NAME}..."
            gh api "repos/${REPO}/releases/assets/${ASSET_ID}" -H "Accept: application/octet-stream" > "${ASSET_NAME}"
            echo "  Downloaded: $(wc -c < "${ASSET_NAME}") bytes"
          done
          
          echo "Assets downloaded: $(ls -1 /tmp/assets | wc -l) files"

      - name: Create or update tag and release in zagent_r
        id: create_release
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          TAG="${{ steps.source.outputs.tag_name }}"
          SOURCE_REPO="${{ steps.source.outputs.source_repo }}"
          
          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Check if tag already exists locally
          TAG_EXISTS=$(git tag -l "${TAG}")
          
          if [ -z "$TAG_EXISTS" ]; then
            # Tag doesn't exist - create it
            git commit --allow-empty -m "Release ${TAG}"
            git tag "${TAG}"
            git push origin "${TAG}"
            echo "Tag ${TAG} created."
          else
            echo "Tag ${TAG} already exists, skipping tag creation."
          fi
          
          # Build release body
          ORIGINAL_BODY=$(cat /tmp/release_body.txt 2>/dev/null || echo "")
          RELEASE_BODY="> Synced from [${SOURCE_REPO}](https://github.com/${SOURCE_REPO}) release [${TAG}](https://github.com/${SOURCE_REPO}/releases/tag/${TAG})"
          if [ -n "$ORIGINAL_BODY" ]; then
            RELEASE_BODY="${RELEASE_BODY}\n\n---\n\n${ORIGINAL_BODY}"
          fi
          
          PRERELEASE_FLAG=""
          if [ "${{ steps.release.outputs.prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          
          # Check if release already exists
          EXISTING_RELEASE=$(gh release view "${TAG}" --repo "ctz168/zagent_r" --json tagName 2>/dev/null || echo "")
          
          if [ -z "$EXISTING_RELEASE" ]; then
            # Create new release
            gh release create "${TAG}" \
              --repo "ctz168/zagent_r" \
              --title "${{ steps.release.outputs.release_name }}" \
              --notes "${RELEASE_BODY}" \
              ${PRERELEASE_FLAG}
            echo "Release created successfully."
          else
            # Update existing release body
            gh release edit "${TAG}" \
              --repo "ctz168/zagent_r" \
              --notes "${RELEASE_BODY}"
            echo "Release already exists, updated release notes."
          fi

      - name: Upload assets
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          TAG="${{ steps.source.outputs.tag_name }}"
          cd /tmp/assets
          
          # Upload all assets (--clobber to overwrite existing)
          ls -la
          for FILE in *; do
            if [ ! -f "$FILE" ]; then
              continue
            fi
            echo "Uploading ${FILE}..."
            gh release upload "${TAG}" "${FILE}" \
              --repo "ctz168/zagent_r" \
              --clobber
            echo "  Uploaded ${FILE}"
          done

      - name: Summary
        run: |
          echo "## Release Sync Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** \`${{ steps.source.outputs.tag_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Source:** [${{ steps.source.outputs.source_repo }}](https://github.com/${{ steps.source.outputs.source_repo }})" >> $GITHUB_STEP_SUMMARY
          echo "**Target:** [ctz168/zagent_r](https://github.com/ctz168/zagent_r/releases)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Assets" >> $GITHUB_STEP_SUMMARY
          cd /tmp/assets
          for FILE in *; do
            SIZE=$(du -h "$FILE" | cut -f1)
            echo "- \`${FILE}\` (${SIZE})" >> $GITHUB_STEP_SUMMARY
          done
